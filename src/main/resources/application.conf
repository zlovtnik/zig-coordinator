tidb {
  host = "127.0.0.1"
  host = ${?TIDB_HOST}
  port = 4000
  port = ${?TIDB_PORT}
  database = "coordinator"
  database = ${?TIDB_DATABASE}
  user = "root"
  user = ${?TIDB_USER}
  password = ""
  password = ${?TIDB_PASSWORD}
  pool-size = 10
  pool-size = ${?TIDB_POOL_SIZE}
  connection-timeout-ms = 5000
  connection-timeout-ms = ${?TIDB_CONNECTION_TIMEOUT_MS}
  statement-timeout-secs = 30
  statement-timeout-secs = ${?TIDB_STATEMENT_TIMEOUT_SECS}
  enabled = true
  enabled = ${?TIDB_ENABLED}
  warn-only = false
  warn-only = ${?TIDB_WARN_ONLY}
}

kafka {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?SYNC_REDPANDA_BOOTSTRAP_SERVERS}
  load-topic = "sync.oracle.load"
  load-topic = ${?SYNC_LOAD_TOPIC}
  result-topic = "sync.oracle.result"
  result-topic = ${?SYNC_RESULT_TOPIC}
  scan-topic = "sync.scan.request"
  scan-topic = ${?COORDINATOR_SCAN_TOPIC}
  payload-audit-topic = "proxy.payload_audit"
  payload-audit-topic = ${?COORDINATOR_PAYLOAD_AUDIT_TOPIC}
  dlq-suffix = ".dlq"
  dlq-suffix = ${?SYNC_DLQ_SUFFIX}
  scan-consumer = "octopus-scan"
  scan-consumer = ${?COORDINATOR_SCAN_CONSUMER}
  result-consumer = "octopus-result"
  result-consumer = ${?COORDINATOR_RESULT_CONSUMER}
  payload-audit-consumer = "octopus-payload-audit"
  payload-audit-consumer = ${?COORDINATOR_PAYLOAD_AUDIT_CONSUMER}
  load-consumer = "octopus-load-worker"
  load-consumer = ${?COORDINATOR_LOAD_CONSUMER}
  max-poll-records = 500
  max-poll-records = ${?COORDINATOR_SCAN_FETCH_COUNT}
  poll-timeout-ms = 3000
  poll-timeout-ms = ${?COORDINATOR_POLL_TIMEOUT_MS}
}

cron {
  idle-sleep-ms = 250
  idle-sleep-ms = ${?COORDINATOR_IDLE_SLEEP_MS}
  idle-sleep-backoff-ms = 1000
  idle-sleep-backoff-ms = ${?COORDINATOR_IDLE_SLEEP_BACKOFF_MS}
  dispatch-batch-size = 50
  dispatch-batch-size = ${?COORDINATOR_DISPATCH_BATCH_SIZE}
  ingest-batch-size = 1000
  ingest-batch-size = ${?COORDINATOR_INGEST_BATCH_SIZE}
  scan-max-attempts = 5
  scan-max-attempts = ${?COORDINATOR_SCAN_MAX_ATTEMPTS}
  scan-retry-backoff-seconds = 30
  scan-retry-backoff-seconds = ${?COORDINATOR_SCAN_RETRY_BACKOFF_SECS}
  batch-dispatch-lease-seconds = 300
  batch-dispatch-lease-seconds = ${?COORDINATOR_BATCH_LEASE_SECS}
  batch-max-attempts = 5
  batch-max-attempts = ${?COORDINATOR_BATCH_MAX_ATTEMPTS}
  heartbeat-log-interval-ms = 15000
  heartbeat-log-interval-ms = ${?COORDINATOR_HEARTBEAT_INTERVAL_MS}
  schema-refresh-interval-seconds = 300
  schema-refresh-interval-seconds = ${?SCHEMA_REFRESH_INTERVAL_SECS}
  scan-fetch-count = 500
  scan-fetch-count = ${?COORDINATOR_SCAN_FETCH_COUNT}
  result-fetch-count = 200
  result-fetch-count = ${?COORDINATOR_RESULT_FETCH_COUNT}
}

ingest {
  stream-names = ["proxy.events", "wireless.audit", "audit.wireless.bandwidth",
    "wireless.alert.rogue_ap", "wireless.alert.deauth_flood",
    "wireless.alert.signal_anomaly", "wireless.alert.pmf_attack",
    "wireless.client.inventory", "wireless.probe.flush", "proxy.payload_audit"]
  stream-names = ${?COORDINATOR_STREAM_NAMES}
  load-stream-names = ["proxy.events", "wireless.audit", "audit.wireless.bandwidth",
    "wireless.alert.rogue_ap", "wireless.alert.deauth_flood",
    "wireless.alert.signal_anomaly", "wireless.alert.pmf_attack",
    "wireless.client.inventory", "wireless.probe.flush", "proxy.payload_audit"]
  load-stream-names = ${?COORDINATOR_LOAD_STREAM_NAMES}
}

backpressure {
  budget-multiplier = 4
  budget-multiplier = ${?COORDINATOR_BACKPRESSURE_BUDGET_MULTIPLIER}
  adaptive-pull-change-threshold = 50
  adaptive-pull-change-threshold = ${?COORDINATOR_ADAPTIVE_PULL_CHANGE_THRESHOLD}
  adaptive-pull-min-restart-interval-ms = 10000
  adaptive-pull-min-restart-interval-ms = ${?COORDINATOR_ADAPTIVE_PULL_MIN_RESTART_INTERVAL_MS}
}

system-registry {
  known-origins = ["atheros-sensor", "ssl-proxy", "atheros-search"]
  known-origins = ${?KNOWN_ORIGINS}
}

http {
  port = 8081
  port = ${?COORDINATOR_HTTP_PORT}
}

sync {
  outbox-dir = "/var/lib/sync/outbox"
  outbox-dir = ${?SYNC_OUTBOX_DIR}
}

wireless {
  mac-lookup-topic = "wireless.mac.lookup"
  mac-lookup-topic = ${?WIRELESS_MAC_LOOKUP_TOPIC}
  mac-lookup-consumer = "wireless-mac-lookup"
  mac-lookup-consumer = ${?WIRELESS_MAC_LOOKUP_CONSUMER}
  mac-lookup-reply-topic = "wireless.mac.lookup.reply"
  mac-lookup-reply-topic = ${?WIRELESS_MAC_LOOKUP_REPLY_TOPIC}
  networks-authorized-topic = "wireless.networks.authorized"
  networks-authorized-topic = ${?WIRELESS_NETWORKS_AUTHORIZED_TOPIC}
  networks-authorized-consumer = "wireless-networks-authorized"
  networks-authorized-consumer = ${?WIRELESS_NETWORKS_AUTHORIZED_CONSUMER}
  networks-authorized-reply-topic = "wireless.networks.authorized.reply"
  networks-authorized-reply-topic = ${?WIRELESS_NETWORKS_AUTHORIZED_REPLY_TOPIC}
  probe-flush-topic = "wireless.probe.flush"
  probe-flush-topic = ${?WIRELESS_PROBE_FLUSH_TOPIC}
  probe-flush-consumer = "wireless-probe-flush"
  probe-flush-consumer = ${?WIRELESS_PROBE_FLUSH_CONSUMER}
  consumers-count = 1
  consumers-count = ${?WIRELESS_CONSUMERS_COUNT}
  max-poll-records = 500
  max-poll-records = ${?WIRELESS_MAX_POLL_RECORDS}
  dlq-suffix = ".dlq"
  dlq-suffix = ${?WIRELESS_DLQ_SUFFIX}
}
