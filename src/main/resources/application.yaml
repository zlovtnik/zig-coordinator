# =============================================================================
# Java Coordinator - Spring Boot Application Configuration
# =============================================================================

server:
  port: 8081

spring:
  application:
    name: java-coordinator
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:true}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/sync}
    username: ${POSTGRES_USER:sync}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: coordinator-pg
      register-mbeans: true
      maximum-pool-size: ${COORDINATOR_DB_POOL:35}
      minimum-idle: ${COORDINATOR_DB_POOL_MIN_IDLE:10}
      connection-timeout: ${COORDINATOR_DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${COORDINATOR_DB_VALIDATION_TIMEOUT_MS:3000}
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: ${COORDINATOR_DB_LEAK_DETECTION_THRESHOLD_MS:30000}
      connection-init-sql: SELECT 1
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    default-property-inclusion: non_null

# =============================================================================
# Coordinator configuration - maps directly to environment variables
# =============================================================================
coordinator:
  stream-name: ${SYNC_STREAM_NAME:proxy.events}
  stream-names: ${SYNC_STREAM_NAMES:proxy.events,wireless.audit,audit.wireless.bandwidth,wireless.alert.rogue_ap,wireless.alert.deauth_flood,wireless.alert.signal_anomaly,wireless.alert.pmf_attack,wireless.client.inventory,wireless.probe.flush,proxy.payload_audit}
  oracle-stream-names: ${SYNC_ORACLE_STREAM_NAMES:proxy.events,wireless.audit,audit.wireless.bandwidth,wireless.alert.rogue_ap,wireless.alert.deauth_flood,wireless.alert.signal_anomaly,wireless.alert.pmf_attack,wireless.client.inventory,wireless.probe.flush,proxy.payload_audit}
  scan-topic: ${SYNC_SCAN_TOPIC:sync.scan.request}
  load-topic: ${SYNC_LOAD_TOPIC:sync.oracle.load}
  result-topic: ${SYNC_RESULT_TOPIC:sync.oracle.result}
  payload-audit-topic: ${SYNC_PAYLOAD_AUDIT_TOPIC:${PAYLOAD_AUDIT_REDPANDA_TOPIC:proxy.payload_audit}}
  database-url: ${DATABASE_URL:}
  sync-redpanda-url: ${SYNC_REDPANDA_BOOTSTRAP_SERVERS:}
  redpanda-topic-manifest-file: ${SYNC_REDPANDA_TOPIC_MANIFEST:/app/docker/redpanda/topics.manifest}
  redpanda-publish-timeout-ms: ${SYNC_REDPANDA_PUBLISH_TIMEOUT_MS:10000}
  audit-stream-name: ${AUDIT_STREAM_NAME:AUDIT_STREAM}
  result-stream-name: ${SYNC_RESULT_STREAM_NAME:ORACLE_RESULT_STREAM}
  scan-consumer: ${SYNC_SCAN_CONSUMER:zig-coordinator-scan}
  load-consumer: ${SYNC_LOAD_CONSUMER:oracle-worker-load}
  result-consumer: ${SYNC_RESULT_CONSUMER:zig-coordinator-result}
  payload-audit-consumer: ${SYNC_PAYLOAD_AUDIT_CONSUMER:zig-coordinator-payload-audit}
  wireless-backlog-stream-name: ${WIRELESS_BACKLOG_STREAM_NAME:WIRELESS_BACKLOG_STREAM}
  wireless-mac-stream-name: ${WIRELESS_MAC_STREAM_NAME:WIRELESS_MAC_STREAM}
  wireless-networks-stream-name: ${WIRELESS_NETWORKS_STREAM_NAME:WIRELESS_NETWORKS_STREAM}
  wireless-probe-stream-name: ${WIRELESS_PROBE_STREAM_NAME:WIRELESS_PROBE_STREAM}
  wireless-backlog-save-topic: ${WIRELESS_BACKLOG_SAVE_TOPIC:wireless.backlog.save}
  wireless-backlog-list-topic: ${WIRELESS_BACKLOG_LIST_TOPIC:wireless.backlog.list}
  wireless-backlog-synced-topic: ${WIRELESS_BACKLOG_SYNCED_TOPIC:wireless.backlog.synced}
  wireless-backlog-prune-topic: ${WIRELESS_BACKLOG_PRUNE_TOPIC:wireless.backlog.prune}
  wireless-mac-lookup-topic: ${WIRELESS_MAC_LOOKUP_TOPIC:wireless.mac.lookup}
  wireless-networks-authorized-topic: ${WIRELESS_NETWORKS_AUTHORIZED_TOPIC:wireless.networks.authorized}
  wireless-probe-flush-topic: ${WIRELESS_PROBE_FLUSH_TOPIC:wireless.probe.flush}
  wireless-backlog-save-consumer: ${WIRELESS_BACKLOG_SAVE_CONSUMER:wireless-backlog-save}
  wireless-backlog-list-consumer: ${WIRELESS_BACKLOG_LIST_CONSUMER:wireless-backlog-list}
  wireless-backlog-synced-consumer: ${WIRELESS_BACKLOG_SYNCED_CONSUMER:wireless-backlog-synced}
  wireless-backlog-prune-consumer: ${WIRELESS_BACKLOG_PRUNE_CONSUMER:wireless-backlog-prune}
  wireless-mac-lookup-consumer: ${WIRELESS_MAC_LOOKUP_CONSUMER:wireless-mac-lookup}
  wireless-networks-authorized-consumer: ${WIRELESS_NETWORKS_AUTHORIZED_CONSUMER:wireless-networks-authorized}
  wireless-probe-flush-consumer: ${WIRELESS_PROBE_FLUSH_CONSUMER:wireless-probe-flush}
  wireless-backlog-list-reply-topic: ${WIRELESS_BACKLOG_LIST_REPLY_TOPIC:wireless.backlog.list.reply}
  wireless-backlog-prune-reply-topic: ${WIRELESS_BACKLOG_PRUNE_REPLY_TOPIC:wireless.backlog.prune.reply}
  wireless-mac-lookup-reply-topic: ${WIRELESS_MAC_LOOKUP_REPLY_TOPIC:wireless.mac.lookup.reply}
  wireless-networks-authorized-reply-topic: ${WIRELESS_NETWORKS_AUTHORIZED_REPLY_TOPIC:wireless.networks.authorized.reply}
  wireless-raw-archive-enabled: ${WIRELESS_RAW_ARCHIVE_ENABLED:true}
  wireless-raw-payload-hot-days: ${WIRELESS_RAW_PAYLOAD_HOT_DAYS:7}
  sync-event-row-retention-days: ${SYNC_EVENT_ROW_RETENTION_DAYS:30}
  sync-event-tombstone-retention-days: ${SYNC_EVENT_TOMBSTONE_RETENTION_DAYS:45}
  wireless-raw-archive-batch-size: ${WIRELESS_RAW_ARCHIVE_BATCH_SIZE:100}
  retention-prune-batch-size: ${SYNC_EVENT_RETENTION_PRUNE_BATCH_SIZE:5000}
  wireless-raw-archive-interval-ms: ${WIRELESS_RAW_ARCHIVE_INTERVAL_MS:300000}
  retention-maintenance-interval-ms: ${RETENTION_MAINTENANCE_INTERVAL_MS:3600000}
  wireless-raw-archive-bucket: ${WIRELESS_RAW_ARCHIVE_BUCKET:ssl-proxy-wireless-raw-archive}
  minio-endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  minio-access-key-id: ${MINIO_ACCESS_KEY_ID}
  minio-secret-access-key: ${MINIO_SECRET_ACCESS_KEY}
  sync-outbox-dir: ${SYNC_OUTBOX_DIR:/sync-outbox}
  scan-max-attempts: ${SYNC_SCAN_MAX_ATTEMPTS:5}
  scan-retry-backoff-seconds: ${SYNC_SCAN_RETRY_BACKOFF_SECONDS:30}
  batch-dispatch-lease-seconds: ${SYNC_BATCH_DISPATCH_LEASE_SECONDS:300}
  batch-max-attempts: ${SYNC_BATCH_MAX_ATTEMPTS:5}
  scan-fetch-count: ${SYNC_SCAN_FETCH_COUNT:500}
  result-fetch-count: ${SYNC_RESULT_FETCH_COUNT:200}
  scan-consumers-count: ${SYNC_SCAN_CONSUMERS_COUNT:1}
  result-consumers-count: ${SYNC_RESULT_CONSUMERS_COUNT:1}
  wireless-consumers-count: ${WIRELESS_CONSUMERS_COUNT:1}
  wireless-max-poll-records: ${WIRELESS_MAX_POLL_RECORDS:1}
  ingest-batch-size: ${SYNC_INGEST_BATCH_SIZE:1000}
  dispatch-batch-size: ${SYNC_DISPATCH_BATCH_SIZE:50}
  idle-sleep-ms: ${SYNC_IDLE_SLEEP_MS:250}
  idle-sleep-backoff-ms: ${SYNC_IDLE_SLEEP_BACKOFF_MS:1000}
  backpressure-budget-multiplier: ${SYNC_BACKPRESSURE_BUDGET_MULTIPLIER:4}
  adaptive-pull-change-threshold: ${SYNC_ADAPTIVE_PULL_CHANGE_THRESHOLD:50}
  adaptive-pull-min-restart-interval-ms: ${SYNC_ADAPTIVE_PULL_MIN_RESTART_INTERVAL_MS:10000}
  redpanda-lag-metrics-enabled: ${SYNC_REDPANDA_LAG_METRICS_ENABLED:true}
  redpanda-lag-metrics-poll-interval-ms: ${SYNC_REDPANDA_LAG_METRICS_POLL_INTERVAL_MS:10000}
  redpanda-lag-metrics-timeout-ms: ${SYNC_REDPANDA_LAG_METRICS_TIMEOUT_MS:5000}
  heartbeat-log-interval-ms: ${SYNC_HEARTBEAT_LOG_INTERVAL_MS:15000}

oracle-sink:
  enabled: ${ORACLE_SINK_ENABLED:false}
  wireless-enabled: ${ORACLE_SINK_WIRELESS_ENABLED:true}
  schema-validation-warn-only: ${ORACLE_SINK_SCHEMA_VALIDATION_WARN_ONLY:false}
  conn: ${ORACLE_CONN:}
  jdbc-url: ${ORACLE_JDBC_URL:}
  user: ${ORACLE_USER:}
  pass-file: ${ORACLE_PASS_FILE:}
  tns-admin: ${TNS_ADMIN:}
  maximum-pool-size: ${ORACLE_COORDINATOR_POOL:8}
  minimum-idle: ${ORACLE_COORDINATOR_POOL_MIN_IDLE:1}
  connection-timeout-ms: ${ORACLE_COORDINATOR_CONNECTION_TIMEOUT_MS:30000}
  validation-timeout-ms: ${ORACLE_COORDINATOR_VALIDATION_TIMEOUT_MS:3000}
  idle-timeout-ms: ${ORACLE_COORDINATOR_IDLE_TIMEOUT_MS:600000}
  max-lifetime-ms: ${ORACLE_COORDINATOR_MAX_LIFETIME_MS:1800000}
  leak-detection-threshold-ms: ${ORACLE_COORDINATOR_LEAK_DETECTION_THRESHOLD_MS:30000}
  connection-init-sql: ${ORACLE_COORDINATOR_CONNECTION_INIT_SQL:SELECT 1 FROM DUAL}
  statement-timeout-secs: ${ORACLE_STATEMENT_TIMEOUT_SECS:30}
  load-max-retries: ${ORACLE_LOAD_MAX_RETRIES:3}

# =============================================================================
# Apache Camel
# =============================================================================
camel:
  springboot:
    name: java-coordinator
    main-run-controller: true
  main:
    exchange-factory: pooled
    exchange-factory-capacity: ${CAMEL_EXCHANGE_FACTORY_CAPACITY:100}
    exchange-factory-statistics-enabled: false
    jmx-enabled: false
    stream-caching-enabled: false
  component:
    kafka:
      brokers: ${SYNC_REDPANDA_BOOTSTRAP_SERVERS:localhost:9092}
      auto-offset-reset: earliest
      allow-auto-create-topics: false
      max-poll-records: 500
      consumer-request-timeout-ms: 30000
      session-timeout-ms: 45000
      heartbeat-interval-ms: 3000
      group-id: java-coordinator

# =============================================================================
# Actuator (health, metrics)
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,hikaricp,prometheus}
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.05}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      transport: grpc

# =============================================================================
# Logging
# =============================================================================
logging:
  level:
    root: INFO
    com.sslproxy.coordinator: INFO
    org.apache.camel: INFO
    org.springframework: WARN
    com.zaxxer.hikari: WARN
