# TiDB standalone for local coordinator development.
#
# Starts a single-node TiDB server (TiDB + TiKV + PD in one process).
# MySQL-compatible on port 4000, status/UI on port 10080.
#
# Usage:
#   docker compose up -d
#   mysql -h 127.0.0.1 -P 4000 -u root < init/001_schema.sql
#
# Connection string for the coordinator:
#   jdbc:mysql://127.0.0.1:4000/coordinator?rewriteBatchedStatements=true&useSSL=false&allowPublicKeyRetrieval=true
#
# Clean stop:
#   docker compose down -v

services:
  tidb:
    image: pingcap/tidb:latest
    container_name: tidb-coordinator
    ports:
      - "4000:4000"    # MySQL protocol port
      - "10080:10080"  # Status / Prometheus / Dashboard
    environment:
      # Run in unistore (embedded TiKV) mode — no separate PD/TiKV needed.
      # These flags are passed as tidb-server arguments.
      TIDB_ARGS: >
        --store=unistore
        --path=/tmp/tidb
        --log-file=
    volumes:
      # Init scripts are mounted but not auto-executed by TiDB.
      # Run manually: mysql -h 127.0.0.1 -P 4000 -u root < init/001_schema.sql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-P", "4000", "-u", "root", "-e", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped