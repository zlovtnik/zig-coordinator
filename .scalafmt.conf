version = "3.8.3"
runner.dialect = scala3
maxColumn = 120
lineEndings = unix
indent.main = 2
indent.callSite = 2
indent.defnSite = 2
continuationIndent.callSite = 2
continuationIndent.defnSite = 2
align.preset = none
danglingParentheses.preset = true
project.git = true
rewrite.rules = [PreferCurlyFors, RedundantBraces, RedundantParens, AvoidInfix]
docstrings.wrap = keep